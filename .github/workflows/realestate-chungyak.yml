name: realestate-chungyak-daily

on:
  schedule:
    # 매일 UTC 23:00 = KST 08:00 (아침 정기 알림)
    - cron: '0 23 * * *'
    # 매일 UTC 10:00 = KST 19:00 (저녁 마감 임박 리마인더)
    - cron: '0 10 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode (send / detect / all / evening)'
        default: 'all'
        required: false

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests python-dotenv

      - name: Sync (pull --rebase before run)
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git fetch origin
          git pull --rebase origin main || true

      - name: Determine mode (cron schedule branching)
        id: mode
        env:
          SCHED: ${{ github.event.schedule }}
          MANUAL_MODE: ${{ github.event.inputs.mode }}
        run: |
          if [ -n "$MANUAL_MODE" ]; then
            MODE="$MANUAL_MODE"
            echo "Manual trigger: $MODE"
          elif [ "$SCHED" = "0 10 * * *" ]; then
            MODE="evening"
            echo "Cron 19시 KST → evening 모드"
          else
            MODE="all"
            echo "Cron 08시 KST → all 모드"
          fi
          echo "mode=$MODE" >> $GITHUB_OUTPUT

      - name: Run chungyak alert
        env:
          REALESTATE_BOT_TOKEN: ${{ secrets.REALESTATE_BOT_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          # 부동산 전용 그룹 chat_id (운동/DART/IB는 개인 ID 유지)
          TELEGRAM_CHAT_ID: ${{ secrets.REALESTATE_CHAT_ID }}
        run: |
          python realestate/scripts/fetch_chungyak.py --mode "${{ steps.mode.outputs.mode }}"

      - name: Save snapshot (신규 감지 상태 보존)
        if: success()
        run: |
          git add realestate/data/chungyak/snapshot.json || true
          git diff --staged --quiet || (git commit -m "chungyak: snapshot update (${{ steps.mode.outputs.mode }})" && git push) || true
