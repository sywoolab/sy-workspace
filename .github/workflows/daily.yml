name: daily-reminder

on:
  schedule:
    - cron: '40 20 * * *'   # UTC 20:40 = KST 05:40 (아침)
    - cron: '0 9 * * *'    # UTC 09시 = KST 18시 (저녁)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  morning:
    if: github.event.schedule != '0 9 * * *'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests urllib3

      - name: Send task reminder
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          TASKS=$(awk '/^## 진행 중$/{flag=1; next} /^## /{flag=0} flag' tasks.md | grep '^\- \[' | sed 's/^- \[.\] //' | awk '{printf "%d. %s\n", NR, $0}' | head -20)
          if [ -z "$TASKS" ]; then
            TASKS="등록된 할 일이 없습니다."
          fi
          DATE=$(TZ=Asia/Seoul date '+%Y-%m-%d (%a)')
          TEXT=$(printf "📋 %s 오늘의 할 일\n\n%s" "$DATE" "$TASKS")
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d chat_id="${CHAT_ID}" \
            -d text="${TEXT}"

      - name: Send workout alert
        env:
          BOT_TOKEN: ${{ secrets.TRAINING_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/workout_alert.py morning

      - name: Send triathlon alert
        env:
          BOT_TOKEN: ${{ secrets.TRAINING_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/triathlon_alert.py

      - name: Save triathlon data
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/triathlon_events.json
          if ! git diff --staged --quiet; then
            git commit -m "update triathlon events"
            git push
          fi

  evening:
    if: github.event.schedule == '0 9 * * *'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests

      - name: Send workout reminder
        env:
          BOT_TOKEN: ${{ secrets.TRAINING_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/workout_alert.py evening
