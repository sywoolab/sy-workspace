name: daily-reminder

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests urllib3

      - name: Send task reminder
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          TASKS=$(awk '/^## 진행 중$/{flag=1; next} /^## /{flag=0} flag' tasks.md | grep '^\- \[' | head -20)
          if [ -z "$TASKS" ]; then
            TASKS="등록된 할 일이 없습니다."
          fi
          DATE=$(TZ=Asia/Seoul date '+%Y-%m-%d (%a)')
          TEXT=$(printf "📋 %s 오늘의 할 일\n\n%s\n\n좋은 하루 되세요!" "$DATE" "$TASKS")
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d chat_id="${CHAT_ID}" \
            -d text="${TEXT}"

      - name: Send triathlon alert
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/triathlon_alert.py

      - name: Save triathlon data
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/triathlon_events.json
          git diff --staged --quiet || git commit -m "update triathlon events" && git push || true
