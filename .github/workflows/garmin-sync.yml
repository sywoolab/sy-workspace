name: garmin-sync

on:
  schedule:
    # KST 08:00, 12:00, 16:00, 20:00 → UTC 23:00(전날), 03:00, 07:00, 11:00
    - cron: '0 23 * * *'
    - cron: '0 3 * * *'
    - cron: '0 7 * * *'
    - cron: '0 11 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install garminconnect requests

      - name: Sync Garmin data
        env:
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/garmin_sync.py

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add workout_log.json data/garmin_health.json
          if ! git diff --staged --quiet; then
            git commit -m "garmin sync: update workout log & health data"
            git push
          fi

      - name: Run workout analysis (if workout_log changed)
        if: success()
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if git log -1 --pretty=%B | grep -q "garmin sync"; then
            python scripts/workout_analysis.py
            git add workout_schedule.json
            if ! git diff --staged --quiet; then
              git commit -m "update workout analysis"
              git push
            fi
          fi
