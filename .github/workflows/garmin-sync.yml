name: garmin-sync

on:
  schedule:
    # KST 2회/일 (13:17, 21:17) — 2026-05-11 가민 429 rate limit 사고 후 축소
    # 이전 7회/일은 GH Actions IP 풀에서 가민 API rate limit hit 빈발 → 5/8~5/11 silent sync miss
    # 안정성 우선: cron 빈도 < 가민 server 측 IP rate limit window
    # 즉시 sync 필요 시 workflow_dispatch 수동 trigger
    - cron: '17 4 * * *'   # KST 13:17 — 점심 (오전 운동 흡수)
    - cron: '17 12 * * *'  # KST 21:17 — 저녁 마무리 (저녁 운동 흡수)
  workflow_dispatch:
    inputs:
      mode:
        description: 'sync (기본) 또는 resend (오늘 운동 재전송)'
        default: 'sync'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install -r requirements.txt

      - name: Sync Garmin data
        env:
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
          GARMIN_TOKENS: ${{ secrets.GARMIN_TOKENS }}
          BOT_TOKEN: ${{ secrets.TRAINING_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GH_TOKEN: ${{ secrets.GH_PAT }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python workout/scripts/garmin_sync.py ${{ github.event.inputs.mode || 'sync' }}

      - name: Commit changes
        if: always()
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add workout/workout_log.json workout/data/garmin_health.json workout/data/sync_state.json 2>/dev/null || true
          if ! git diff --staged --quiet; then
            git commit -m "garmin sync: update workout log & health data"
            git push
          fi

      - name: Adaptive schedule adjustment
        if: success()
        env:
          BOT_TOKEN: ${{ secrets.TRAINING_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python workout/scripts/adaptive_scheduler.py
          git add workout/workout_schedule.json
          git add workout/data/improvement_queue.json 2>/dev/null || true
          if ! git diff --staged --quiet; then
            git commit -m "adaptive: schedule adjustment"
            git push
          fi

      - name: Run workout analysis (if workout_log changed)
        if: success()
        env:
          BOT_TOKEN: ${{ secrets.TRAINING_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if git log -1 --pretty=%B | grep -q "garmin sync"; then
            python workout/scripts/workout_analysis.py
            git add workout/workout_schedule.json
            if ! git diff --staged --quiet; then
              git commit -m "update workout analysis"
              git push
            fi
          fi
