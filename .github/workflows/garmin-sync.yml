name: garmin-sync

on:
  schedule:
    # KST 08~22시 2시간마다 → UTC 23,01,03,05,07,09,11,13
    - cron: '0 23 * * *'
    - cron: '0 1 * * *'
    - cron: '0 3 * * *'
    - cron: '0 5 * * *'
    - cron: '0 7 * * *'
    - cron: '0 9 * * *'
    - cron: '0 11 * * *'
    - cron: '0 13 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'sync (기본) 또는 resend (오늘 운동 재전송)'
        default: 'sync'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install garminconnect requests

      - name: Sync Garmin data
        env:
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
          GARMIN_TOKENS: ${{ secrets.GARMIN_TOKENS }}
          BOT_TOKEN: ${{ secrets.TRAINING_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/garmin_sync.py ${{ github.event.inputs.mode || 'sync' }}

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add workout_log.json data/garmin_health.json
          if ! git diff --staged --quiet; then
            git commit -m "garmin sync: update workout log & health data"
            git push
          fi

      - name: Run workout analysis (if workout_log changed)
        if: success()
        env:
          BOT_TOKEN: ${{ secrets.TRAINING_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if git log -1 --pretty=%B | grep -q "garmin sync"; then
            python scripts/workout_analysis.py
            git add workout_schedule.json
            if ! git diff --staged --quiet; then
              git commit -m "update workout analysis"
              git push
            fi
          fi
