name: garmin-sync

on:
  schedule: []
  # ⚠️ cron 비활성화 (2026-05-18) — GH Actions IP 풀이 가민 측에 영구 차단 상태
  # 5/14 fix 후 1회 success → 5/15~5/17 cron 매번 429 + 수동 trigger도 429
  # 차단 자연 해소 위해 cron 제거. 매 cron 429 시도가 가민 측 차단 강화 신호 되는 것 차단
  # 수동 sync는 Mac/Win 로컬에서 `gsync` alias 사용 (개인 IP는 차단 안 됨)
  # 미래 가민 차단 풀리면 workflow_dispatch로 검증 후 cron 부활 가능
  workflow_dispatch:
    inputs:
      mode:
        description: 'sync (기본) 또는 resend (오늘 운동 재전송)'
        default: 'sync'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install -r requirements.txt

      - name: Sync Garmin data
        env:
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
          GARMIN_TOKENS: ${{ secrets.GARMIN_TOKENS }}
          BOT_TOKEN: ${{ secrets.TRAINING_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GH_TOKEN: ${{ secrets.GH_PAT }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python workout/scripts/garmin_sync.py ${{ github.event.inputs.mode || 'sync' }}

      - name: Commit changes
        if: always()
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add workout/workout_log.json workout/data/garmin_health.json workout/data/sync_state.json 2>/dev/null || true
          if ! git diff --staged --quiet; then
            git commit -m "garmin sync: update workout log & health data"
            git push
          fi

      - name: Adaptive schedule adjustment
        if: success()
        env:
          BOT_TOKEN: ${{ secrets.TRAINING_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python workout/scripts/adaptive_scheduler.py
          git add workout/workout_schedule.json
          git add workout/data/improvement_queue.json 2>/dev/null || true
          if ! git diff --staged --quiet; then
            git commit -m "adaptive: schedule adjustment"
            git push
          fi

      - name: Run workout analysis (if workout_log changed)
        if: success()
        env:
          BOT_TOKEN: ${{ secrets.TRAINING_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if git log -1 --pretty=%B | grep -q "garmin sync"; then
            python workout/scripts/workout_analysis.py
            git add workout/workout_schedule.json
            if ! git diff --staged --quiet; then
              git commit -m "update workout analysis"
              git push
            fi
          fi
