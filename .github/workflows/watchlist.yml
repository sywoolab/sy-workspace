name: watchlist-alert

on:
  # 정기 알림은 ib-team-news / ib-team-disclosures로 통합.
  # 필요 시 수동 검증용으로만 실행한다.
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests

      - name: Run watchlist alert
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python ib/scripts/watchlist_alert.py

      - name: Save sent history
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add ib/data/watchlist_sent.json
          git diff --staged --quiet || git commit -m "update watchlist_sent" && git push || true
