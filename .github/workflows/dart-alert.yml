name: dart-alert

on:
  schedule:
    - cron: '0,30 0-8 * * 1-5'  # UTC 0~8시 = KST 9~17시, 평일 30분마다
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests

      - name: Run DART alert
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python ib/scripts/dart_alert.py

      - name: Save sent history
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add ib/data/dart_sent.json
          git diff --staged --quiet || git commit -m "update dart_sent" && git push || true
