name: realestate-brief

on:
  schedule:
    - cron: '30 22 * * 0'   # 매주 월요일 07:30 KST (UTC 일요일 22:30)
  push:
    paths:
      - 'realestate/data/market_config.json'
      - 'realestate/data/watchlist_summary.json'
      - 'realestate/data/chungyak/registry.json'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2  # HEAD~1 비교용 (notify_realestate_change.py)

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests

      - name: Notify SSOT change (push만)
        id: notify
        if: github.event_name == 'push'
        continue-on-error: true
        env:
          BOT_TOKEN: ${{ secrets.REALESTATE_BOT_TOKEN }}
          REALESTATE_BOT_TOKEN: ${{ secrets.REALESTATE_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python realestate/scripts/notify_realestate_change.py

      - name: Notify failure of SSOT notify step
        if: github.event_name == 'push' && steps.notify.outcome == 'failure'
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.REALESTATE_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="⚠️ realestate notify_realestate_change.py 실패 — SSOT 변경 텔레 알림 미발송 ($(date '+%Y-%m-%d %H:%M KST'))" || true
          echo "::warning::notify_realestate_change.py failed — SSOT change not propagated to telegram"

      - name: 워치리스트 정합성 검증
        continue-on-error: true
        env:
          BOT_TOKEN: ${{ secrets.REALESTATE_BOT_TOKEN }}
          REALESTATE_BOT_TOKEN: ${{ secrets.REALESTATE_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python realestate/scripts/validate_watchlist.py

      - name: MS 부동산 Dashboard HTML 생성
        id: brief
        env:
          BOT_TOKEN: ${{ secrets.REALESTATE_BOT_TOKEN }}
          REALESTATE_BOT_TOKEN: ${{ secrets.REALESTATE_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python realestate/scripts/re_brief.py

      - name: 실패 시 텔레그램 알림
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.REALESTATE_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="⚠️ MS 부동산 Dashboard 생성 실패 ($(date '+%Y-%m-%d %H:%M KST'))" || true

      - name: Commit HTML
        if: always()
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          # market_config.json은 push 트리거 paths이므로 무한 루프 차단 위해 add 제외
          git add docs/re.html 2>/dev/null || true
          if ! git diff --staged --quiet; then
            git commit -m "realestate: MS 부동산 Dashboard update"
            git pull --rebase --autostash
            git push
          fi
