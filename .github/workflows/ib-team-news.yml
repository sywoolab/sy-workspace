name: ib-team-news

on:
  schedule:
    - cron: '30 22 * * 0-4'  # 07:30 KST 월~금 (텔레그램 + 뉴스 + HTML)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests

      - name: 뉴스브리프 HTML 생성 + 텔레그램 발송
        env:
          IB_TEAM_BOT_TOKEN: ${{ secrets.IB_TEAM_BOT_TOKEN }}
          IB_TEAM_CHAT_ID: ${{ secrets.IB_TEAM_CHAT_ID }}
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
        run: python ib/scripts/ib_team_news.py

      - name: 실패 시 텔레그램 알림
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.IB_TEAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.IB_TEAM_CHAT_ID }}" \
            -d text="⚠️ <b>IB Daily Brief 자동 발송 실패</b>%0A$(date +'%Y-%m-%d %H:%M KST')" \
            -d parse_mode="HTML" || true

      - name: Commit HTML & sent record
        if: always()
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add docs/index.html docs/prices3m.json 2>/dev/null || true
          git add ib/data/team_news_sent.json 2>/dev/null || true
          if ! git diff --staged --quiet; then
            git commit -m "ib-team news: daily brief update"
            git pull --rebase --autostash
            git push
          fi
