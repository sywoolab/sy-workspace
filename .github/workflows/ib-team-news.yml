name: ib-team-news

on:
  schedule:
    # ── 텔레그램 발송 (일 2회) ─────────────────────
    - cron: '30 22 * * 0-4'  # 07:30 KST 월~금 (텔레그램 + HTML)
    - cron: '0 6 * * 1-5'    # 15:00 KST 월~금 (텔레그램 + HTML)
    # ── 주가 업데이트 전용 (장중 매 1시간) ───────────
    # 09:00 / 10:00 / 11:00 / 12:00 / 13:00 / 14:00 KST (월~금)
    # UTC = KST - 9h
    - cron: '0 0 * * 1-5'    # 09:00 KST
    - cron: '0 1 * * 1-5'    # 10:00 KST
    - cron: '0 2 * * 1-5'    # 11:00 KST
    - cron: '0 3 * * 1-5'    # 12:00 KST
    - cron: '0 4 * * 1-5'    # 13:00 KST
    - cron: '0 5 * * 1-5'    # 14:00 KST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests

      - name: 뉴스브리프 HTML 생성 + 텔레그램 발송
        env:
          IB_TEAM_BOT_TOKEN: ${{ secrets.IB_TEAM_BOT_TOKEN }}
          IB_TEAM_CHAT_ID: ${{ secrets.IB_TEAM_CHAT_ID }}
        run: python ib/scripts/ib_team_news.py

      - name: Commit HTML & sent record
        if: always()
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add docs/morning.html docs/afternoon.html 2>/dev/null || true
          git add ib/data/team_news_sent.json 2>/dev/null || true
          if ! git diff --staged --quiet; then
            git commit -m "ib-team news: sent record update"
            git pull --rebase
            git push
          fi
