name: ib-team-live

on:
  schedule:
    - cron: '*/10 23 * * 0-4'  # 08:00~08:50 KST 월~금
    - cron: '*/10 0-7 * * 1-5'  # 09:00~16:50 KST 월~금
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-live-json:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests

      - name: Generate live IB brief snapshot
        env:
          IB_LIVE_ONLY: '1'
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
        run: python ib/scripts/ib_team_news.py

      - name: Commit live snapshot
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add docs/ib_live.json 2>/dev/null || true
          if ! git diff --staged --quiet; then
            git commit -m "ib-team live snapshot update"
            git pull --rebase --autostash
            git push
          fi
